{% extends "./base.html" %}
{% block content %}
  <article>
    {%- if title | length != 0 -%}
      <h1><a href="{{ url }}">{{ title }}</a></h1>
    {%- endif -%}

    <a href="{{ note.url }}"><time datetime="{{ date | isoDate }}">{{ date | readableDate }} {{ date | readableTime }}</time></a>
    {{ content | safe }}
  </article>
{% endblock %}
